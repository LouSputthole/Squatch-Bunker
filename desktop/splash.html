<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      height: 350px;
      background: #1a1a2e;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0e0e0;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #ff6b35;
      margin-bottom: 8px;
    }
    .status {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }
    .loader {
      width: 40px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: #ff6b35;
      border-radius: 2px;
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }
  </style>
</head>
<body>
  <img class="logo" src="../squatch-chat/public/campfire-logo.png" alt="Campfire"
       onerror="this.style.display='none'">
  <div class="title">Campfire</div>
  <div class="status">Starting up...</div>
  <div class="loader"><div class="loader-bar"></div></div>
</body>
</html>
