<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      height: 350px;
      background: radial-gradient(circle at 50% 38%, #2a1a0f 0%, #17110d 70%);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0d6cc;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .flame {
      width: 96px;
      height: 96px;
      margin-bottom: 22px;
      transform-origin: 50% 90%;
      animation: flicker 1.6s ease-in-out infinite;
      filter: drop-shadow(0 0 14px rgba(255, 107, 53, 0.55));
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #ff6b35;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .status { font-size: 13px; color: #9a8b7d; margin-bottom: 24px; }
    .loader {
      width: 48px; height: 4px;
      background: #3a2a1e; border-radius: 2px; overflow: hidden;
    }
    .loader-bar {
      width: 40%; height: 100%;
      background: linear-gradient(90deg, #ff6b35, #ffb347);
      border-radius: 2px;
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes flicker {
      0%, 100% { transform: scale(1) rotate(-1deg); opacity: 1; }
      50% { transform: scale(1.06) rotate(1deg); opacity: 0.9; }
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(280%); }
    }
  </style>
</head>
<body>
  <svg class="flame" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M32 4c4 10-6 14-6 24 0 3 1.5 5.5 3.5 7-1-6 3-9 3-13 4 4 9 8 9 16 0 9-7 15-13.5 15C22 53 15 47 15 37 15 22 30 18 32 4Z"
          fill="#ff6b35"/>
    <path d="M33 24c2 4-3 7-3 12 0 4 3 7 6 7 3 0 6-3 6-8 0-6-6-8-9-11Z"
          fill="#ffb347"/>
  </svg>
  <div class="title">Campfire</div>
  <div class="status">Lighting the fire…</div>
  <div class="loader"><div class="loader-bar"></div></div>
</body>
</html>
