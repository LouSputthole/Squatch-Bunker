name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        # The app lives in squatch-chat/; every step runs from there.
        working-directory: squatch-chat


    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: squatch-chat/package-lock.json
      - name: Verify release tag matches package version
        if: github.ref_type == 'tag'
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}." >&2
            exit 1
          fi
      - name: Assert clean install inputs
        run: |
          test ! -e .env
          test ! -d node_modules
          test ! -d generated
          test ! -e data/campfire.db

      # postinstall generates both Prisma clients and synchronizes SQLite.
      - name: Install dependencies
        run: npm ci


      - name: Verify zero-config installation
        run: |
          grep -Fxq 'DATABASE_URL="file:./data/campfire.db"' .env
          grep -Eq '^JWT_SECRET="[0-9a-f]{64}"$' .env
          test -s data/campfire.db

      - name: Check release metadata
        run: npm run release:check
      - name: Audit production dependencies
        run: npm audit --audit-level=high

      - name: Check SQLite and PostgreSQL schemas
        run: npm run db:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify reproducible regeneration and build
        run: |
          find generated -type f -print0 |
            sort -z |
            xargs -0 sha256sum > "$RUNNER_TEMP/prisma-first.sha256"

          rm -rf generated .next
          npm run db:generate
          npm run db:check

          find generated -type f -print0 |
            sort -z |
            xargs -0 sha256sum > "$RUNNER_TEMP/prisma-second.sha256"

          diff -u \
            "$RUNNER_TEMP/prisma-first.sha256" \
            "$RUNNER_TEMP/prisma-second.sha256"

          npm run build
          git diff --exit-code -- prisma/schema.postgresql.prisma
