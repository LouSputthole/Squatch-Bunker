name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        # The app lives in squatch-chat/; every step runs from there.
        working-directory: squatch-chat

    env:
      # Harmless CI values. Tests force their own throwaway SQLite file, but
      # lib/config validates JWT_SECRET at import and the build/postinstall need
      # a database URL — SQLite keeps CI dependency-free (no Postgres service).
      JWT_SECRET: ci-jwt-secret-not-a-real-secret-0123456789-abcdef
      DATABASE_URL: file:./data/campfire.db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: squatch-chat/package-lock.json

      # postinstall generates both Prisma clients and synchronizes SQLite.
      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=high

      - name: Check SQLite and PostgreSQL schemas
        run: npm run db:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
