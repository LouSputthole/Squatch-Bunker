<!DOCTYPE html>
<html>
<head><title>JS Test</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:2rem">
<h1>Plain JavaScript Test</h1>
<p id="status">If this text stays, JavaScript is NOT running.</p>
<button onclick="document.getElementById('result').textContent='JS WORKS! Click count: '+(++window.c)" style="padding:12px 24px;font-size:18px;background:#c2410c;color:#fff;border:none;border-radius:6px;cursor:pointer">Click Me</button>
<p id="result" style="margin-top:1rem;font-size:20px;color:#4ade80"></p>
<script>
window.c=0;
document.getElementById('status').textContent='JavaScript is running. Try clicking the button.';
document.getElementById('status').style.color='#4ade80';
</script>
</body>
</html>
