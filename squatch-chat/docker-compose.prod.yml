# Campfire — Production Stack (single port)
# Run: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: campfire-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD to a strong random value}
      POSTGRES_DB: ${DB_NAME:-campfire}
    volumes:
      - campfire-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: campfire-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      CAMPFIRE_EDITION: "${CAMPFIRE_EDITION:-community}"
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?Set DB_PASSWORD to a strong random value}@db:5432/${DB_NAME:-campfire}?schema=public"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET to at least 32 random characters}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-}"
      STRICT_CORS: "${STRICT_CORS:-false}"
      CORS_ORIGINS: "${CORS_ORIGINS:-}"
      CAMPFIRE_UPLOAD_DIR: "/app/media"
      CAMPFIRE_TRUST_PROXY_HOPS: "${CAMPFIRE_TRUST_PROXY_HOPS:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_MONTHLY: "${STRIPE_PRICE_MONTHLY:-}"
      STRIPE_PRICE_YEARLY: "${STRIPE_PRICE_YEARLY:-}"
      TURN_URL: "${TURN_URL:-}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      CAMPFIRE_EMAIL_FROM: "${CAMPFIRE_EMAIL_FROM:-}"
      TURN_USERNAME: "${TURN_USERNAME:-}"
      TURN_CREDENTIAL: "${TURN_CREDENTIAL:-}"
      PORT: 3000
    volumes:
      - campfire-uploads:/app/media/uploads
      - campfire-avatars:/app/media/avatars
      - campfire-private-uploads:/app/media/private-uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5


volumes:
  campfire-data:
  campfire-uploads:
  campfire-avatars:
  campfire-private-uploads:
